naftiko: 1.0.0-alpha2
info:
  label: Fastly TLS API — TLS Activations
  description: 'Fastly TLS API — TLS Activations. 5 operations. Lead operation: List TLS activations. Self-contained Naftiko
    capability covering one Fastly business surface.'
  tags:
  - Fastly
  - TLS Activations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FASTLY_API_KEY: FASTLY_API_KEY
capability:
  consumes:
  - type: http
    namespace: tls-tls-activations
    baseUri: https://api.fastly.com
    description: Fastly TLS API — TLS Activations business capability. Self-contained, no shared references.
    resources:
    - name: tls-activations
      path: /tls/activations
      operations:
      - name: listtlsactivations
        method: GET
        description: List TLS activations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page[number]
          in: query
          type: integer
          description: The page number to retrieve.
        - name: page[size]
          in: query
          type: integer
          description: The number of items per page.
        - name: filter[tls_certificate.id]
          in: query
          type: string
          description: Filter activations by TLS certificate ID.
      - name: createtlsactivation
        method: POST
        description: Create a TLS activation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: tls-activations-tls_activation_id
      path: /tls/activations/{tls_activation_id}
      operations:
      - name: gettlsactivation
        method: GET
        description: Get a TLS activation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tls_activation_id
          in: path
          type: string
          description: The alphanumeric string identifying the TLS activation.
          required: true
      - name: updatetlsactivation
        method: PATCH
        description: Update a TLS activation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tls_activation_id
          in: path
          type: string
          description: The alphanumeric string identifying the TLS activation.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletetlsactivation
        method: DELETE
        description: Delete a TLS activation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tls_activation_id
          in: path
          type: string
          description: The alphanumeric string identifying the TLS activation.
          required: true
    authentication:
      type: apikey
      key: Fastly-Key
      value: '{{env.FASTLY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: tls-tls-activations-rest
    port: 8080
    description: REST adapter for Fastly TLS API — TLS Activations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tls/activations
      name: tls-activations
      description: REST surface for tls-activations.
      operations:
      - method: GET
        name: listtlsactivations
        description: List TLS activations
        call: tls-tls-activations.listtlsactivations
        with:
          page[number]: rest.page[number]
          page[size]: rest.page[size]
          filter[tls_certificate.id]: rest.filter[tls_certificate.id]
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtlsactivation
        description: Create a TLS activation
        call: tls-tls-activations.createtlsactivation
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tls/activations/{tls-activation-id}
      name: tls-activations-tls-activation-id
      description: REST surface for tls-activations-tls_activation_id.
      operations:
      - method: GET
        name: gettlsactivation
        description: Get a TLS activation
        call: tls-tls-activations.gettlsactivation
        with:
          tls_activation_id: rest.tls_activation_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatetlsactivation
        description: Update a TLS activation
        call: tls-tls-activations.updatetlsactivation
        with:
          tls_activation_id: rest.tls_activation_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletetlsactivation
        description: Delete a TLS activation
        call: tls-tls-activations.deletetlsactivation
        with:
          tls_activation_id: rest.tls_activation_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: tls-tls-activations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fastly TLS API — TLS Activations. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-tls-activations
      description: List TLS activations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tls-tls-activations.listtlsactivations
      with:
        page[number]: tools.page[number]
        page[size]: tools.page[size]
        filter[tls_certificate.id]: tools.filter[tls_certificate.id]
      outputParameters:
      - type: object
        mapping: $.
    - name: create-tls-activation
      description: Create a TLS activation
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tls-tls-activations.createtlsactivation
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-tls-activation
      description: Get a TLS activation
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: tls-tls-activations.gettlsactivation
      with:
        tls_activation_id: tools.tls_activation_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-tls-activation
      description: Update a TLS activation
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: tls-tls-activations.updatetlsactivation
      with:
        tls_activation_id: tools.tls_activation_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-tls-activation
      description: Delete a TLS activation
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: tls-tls-activations.deletetlsactivation
      with:
        tls_activation_id: tools.tls_activation_id
      outputParameters:
      - type: object
        mapping: $.
