      - name: deleteconfigstore
        method: DELETE
        description: Delete a config store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: config_store_id
          in: path
          type: string
          description: The alphanumeric string identifying the config store.
          required: true
    authentication:
