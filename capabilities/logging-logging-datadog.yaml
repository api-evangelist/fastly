naftiko: 1.0.0-alpha2
info:
  label: Fastly Real-Time Logging API — Logging Datadog
  description: 'Fastly Real-Time Logging API — Logging Datadog. 2 operations. Lead operation: List Datadog logging endpoints.
    Self-contained Naftiko capability covering one Fastly business surface.'
  tags:
  - Fastly
  - Logging Datadog
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FASTLY_API_KEY: FASTLY_API_KEY
capability:
  consumes:
  - type: http
    namespace: logging-logging-datadog
    baseUri: https://api.fastly.com
    description: Fastly Real-Time Logging API — Logging Datadog business capability. Self-contained, no shared references.
    resources:
    - name: service-service_id-version-version_id-logging-datadog
      path: /service/{service_id}/version/{version_id}/logging/datadog
      operations:
      - name: listlogdatadog
        method: GET
        description: List Datadog logging endpoints
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createlogdatadog
        method: POST
        description: Create a Datadog logging endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Fastly-Key
      value: '{{env.FASTLY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: logging-logging-datadog-rest
    port: 8080
    description: REST adapter for Fastly Real-Time Logging API — Logging Datadog. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/service/{service-id}/version/{version-id}/logging/datadog
      name: service-service-id-version-version-id-logging-datadog
      description: REST surface for service-service_id-version-version_id-logging-datadog.
      operations:
      - method: GET
        name: listlogdatadog
        description: List Datadog logging endpoints
        call: logging-logging-datadog.listlogdatadog
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createlogdatadog
        description: Create a Datadog logging endpoint
        call: logging-logging-datadog.createlogdatadog
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: logging-logging-datadog-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fastly Real-Time Logging API — Logging Datadog. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-datadog-logging-endpoints
      description: List Datadog logging endpoints
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: logging-logging-datadog.listlogdatadog
      outputParameters:
      - type: object
        mapping: $.
    - name: create-datadog-logging-endpoint
      description: Create a Datadog logging endpoint
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: logging-logging-datadog.createlogdatadog
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
