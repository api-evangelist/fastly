naftiko: 1.0.0-alpha2
info:
  label: Fastly Edge Dictionaries API — Dictionary Info
  description: 'Fastly Edge Dictionaries API — Dictionary Info. 1 operations. Lead operation: Get dictionary info. Self-contained
    Naftiko capability covering one Fastly business surface.'
  tags:
  - Fastly
  - Dictionary Info
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FASTLY_API_KEY: FASTLY_API_KEY
capability:
  consumes:
  - type: http
    namespace: dictionaries-dictionary-info
    baseUri: https://api.fastly.com
    description: Fastly Edge Dictionaries API — Dictionary Info business capability. Self-contained, no shared references.
    resources:
    - name: service-service_id-dictionary-dictionary_id-info
      path: /service/{service_id}/dictionary/{dictionary_id}/info
      operations:
      - name: getdictionaryinfo
        method: GET
        description: Get dictionary info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: dictionary_id
          in: path
          type: string
          description: The alphanumeric string identifying the dictionary.
          required: true
    authentication:
      type: apikey
      key: Fastly-Key
      value: '{{env.FASTLY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: dictionaries-dictionary-info-rest
    port: 8080
    description: REST adapter for Fastly Edge Dictionaries API — Dictionary Info. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/service/{service-id}/dictionary/{dictionary-id}/info
      name: service-service-id-dictionary-dictionary-id-info
      description: REST surface for service-service_id-dictionary-dictionary_id-info.
      operations:
      - method: GET
        name: getdictionaryinfo
        description: Get dictionary info
        call: dictionaries-dictionary-info.getdictionaryinfo
        with:
          dictionary_id: rest.dictionary_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dictionaries-dictionary-info-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fastly Edge Dictionaries API — Dictionary Info. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-dictionary-info
      description: Get dictionary info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dictionaries-dictionary-info.getdictionaryinfo
      with:
        dictionary_id: tools.dictionary_id
      outputParameters:
      - type: object
        mapping: $.
