naftiko: 1.0.0-alpha2
info:
  label: Fastly Metrics and Stats API — Domain Inspector
  description: 'Fastly Metrics and Stats API — Domain Inspector. 1 operations. Lead operation: Get real-time domain metrics.
    Self-contained Naftiko capability covering one Fastly business surface.'
  tags:
  - Fastly
  - Domain Inspector
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FASTLY_API_KEY: FASTLY_API_KEY
capability:
  consumes:
  - type: http
    namespace: metrics-and-stats-domain-inspector
    baseUri: https://rt.fastly.com
    description: Fastly Metrics and Stats API — Domain Inspector business capability. Self-contained, no shared references.
    resources:
    - name: v1-channel-service_id-ts-h-domains-domain-limit-max_entries
      path: /v1/channel/{service_id}/ts/h/domains/{domain}/limit/{max_entries}
      operations:
      - name: getdomaininspectorrealtimestats
        method: GET
        description: Get real-time domain metrics
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: domain
          in: path
          type: string
          description: The domain to retrieve metrics for.
          required: true
        - name: max_entries
          in: path
          type: integer
          description: The maximum number of entries to return.
          required: true
    authentication:
      type: apikey
      key: Fastly-Key
      value: '{{env.FASTLY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: metrics-and-stats-domain-inspector-rest
    port: 8080
    description: REST adapter for Fastly Metrics and Stats API — Domain Inspector. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/v1/channel/{service-id}/ts/h/domains/{domain}/limit/{max-entries}
      name: v1-channel-service-id-ts-h-domains-domain-limit-max-entries
      description: REST surface for v1-channel-service_id-ts-h-domains-domain-limit-max_entries.
      operations:
      - method: GET
        name: getdomaininspectorrealtimestats
        description: Get real-time domain metrics
        call: metrics-and-stats-domain-inspector.getdomaininspectorrealtimestats
        with:
          domain: rest.domain
          max_entries: rest.max_entries
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: metrics-and-stats-domain-inspector-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fastly Metrics and Stats API — Domain Inspector. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: get-real-time-domain-metrics
      description: Get real-time domain metrics
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: metrics-and-stats-domain-inspector.getdomaininspectorrealtimestats
      with:
        domain: tools.domain
        max_entries: tools.max_entries
      outputParameters:
      - type: object
        mapping: $.
