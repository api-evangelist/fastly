naftiko: 1.0.0-alpha2
info:
  label: Fastly Compute API — KV Store
  description: 'Fastly Compute API — KV Store. 4 operations. Lead operation: List KV stores. Self-contained Naftiko capability
    covering one Fastly business surface.'
  tags:
  - Fastly
  - KV Store
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FASTLY_API_KEY: FASTLY_API_KEY
capability:
  consumes:
  - type: http
    namespace: compute-kv-store
    baseUri: https://api.fastly.com
    description: Fastly Compute API — KV Store business capability. Self-contained, no shared references.
    resources:
    - name: resources-stores-kv
      path: /resources/stores/kv
      operations:
      - name: listkvstores
        method: GET
        description: List KV stores
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cursor
          in: query
          type: string
          description: A cursor for pagination.
        - name: limit
          in: query
          type: integer
          description: The maximum number of items to return.
      - name: createkvstore
        method: POST
        description: Create a KV store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: resources-stores-kv-store_id
      path: /resources/stores/kv/{store_id}
      operations:
      - name: getkvstore
        method: GET
        description: Get a KV store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletekvstore
        method: DELETE
        description: Delete a KV store
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Fastly-Key
      value: '{{env.FASTLY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: compute-kv-store-rest
    port: 8080
    description: REST adapter for Fastly Compute API — KV Store. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/resources/stores/kv
      name: resources-stores-kv
      description: REST surface for resources-stores-kv.
      operations:
      - method: GET
        name: listkvstores
        description: List KV stores
        call: compute-kv-store.listkvstores
        with:
          cursor: rest.cursor
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createkvstore
        description: Create a KV store
        call: compute-kv-store.createkvstore
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/resources/stores/kv/{store-id}
      name: resources-stores-kv-store-id
      description: REST surface for resources-stores-kv-store_id.
      operations:
      - method: GET
        name: getkvstore
        description: Get a KV store
        call: compute-kv-store.getkvstore
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletekvstore
        description: Delete a KV store
        call: compute-kv-store.deletekvstore
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: compute-kv-store-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fastly Compute API — KV Store. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-kv-stores
      description: List KV stores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: compute-kv-store.listkvstores
      with:
        cursor: tools.cursor
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: create-kv-store
      description: Create a KV store
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: compute-kv-store.createkvstore
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-kv-store
      description: Get a KV store
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: compute-kv-store.getkvstore
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-kv-store
      description: Delete a KV store
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: compute-kv-store.deletekvstore
      outputParameters:
      - type: object
        mapping: $.
