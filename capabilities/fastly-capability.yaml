      - name: listusergroups
        method: GET
        description: List IAM user groups
        inputParameters:
        - name: per_page
          in: query
          type: integer
          description: The number of items per page.
        - name: cursor
          in: query
          type: string
          description: The cursor for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createusergroup
        method: POST
        description: Create an IAM user group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
