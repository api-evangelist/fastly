      path: /user/{user_id}
      operations:
      - name: getuser
        method: GET
        description: Get a user
        inputParameters:
        - name: user_id
          in: path
          type: string
          required: true
          description: The alphanumeric string identifying the user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateuser
        method: PUT
        description: Update a user
        inputParameters:
        - name: user_id
          in: path
          type: string
          required: true
          description: The alphanumeric string identifying the user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteuser
        method: DELETE
        description: Delete a user
        inputParameters:
        - name: user_id
          in: path
          type: string
          required: true
          description: The alphanumeric string identifying the user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: customer-customer-id-users
      path: /customer/{customer_id}/users
      operations:
      - name: listcustomerusers
        method: GET
        description: List users for a customer
        inputParameters:
        - name: customer_id
          in: path
          type: string
          required: true
          description: The alphanumeric string identifying the customer.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: invitations
      path: /invitations
      operations:
      - name: createinvitation
        method: POST
        description: Create a user invitation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: roles
      path: /roles
      operations:
      - name: listroles
        method: GET
        description: List IAM roles
        inputParameters:
        - name: per_page
          in: query
          type: integer
          description: The number of items per page.
        - name: cursor
          in: query
          type: string
          description: The cursor for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: roles-role-id
      path: /roles/{role_id}
      operations:
      - name: getrole
        method: GET
        description: Get an IAM role
        inputParameters:
        - name: role_id
          in: path
          type: string
          required: true
          description: The alphanumeric string identifying the IAM role.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: service-groups
      path: /service-groups
