      - name: listservicegroups
        method: GET
        description: List IAM service groups
        inputParameters:
        - name: per_page
          in: query
          type: integer
          description: The number of items per page.
        - name: cursor
          in: query
          type: string
          description: The cursor for pagination.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createservicegroup
        method: POST
        description: Create an IAM service group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-groups
      path: /user-groups
