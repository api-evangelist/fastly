      inline through this capability's consumes block.
    tools:
    - name: list-automation-tokens
      description: List automation tokens
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: authentication-tokens-automation-tokens.listautomationtokens
      with:
        per_page: tools.per_page
        page: tools.page
      outputParameters:
