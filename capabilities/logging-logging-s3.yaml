naftiko: 1.0.0-alpha2
info:
  label: Fastly Real-Time Logging API — Logging S3
  description: 'Fastly Real-Time Logging API — Logging S3. 2 operations. Lead operation: List S3 logging endpoints. Self-contained
    Naftiko capability covering one Fastly business surface.'
  tags:
  - Fastly
  - Logging S3
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FASTLY_API_KEY: FASTLY_API_KEY
capability:
  consumes:
  - type: http
    namespace: logging-logging-s3
    baseUri: https://api.fastly.com
    description: Fastly Real-Time Logging API — Logging S3 business capability. Self-contained, no shared references.
    resources:
    - name: service-service_id-version-version_id-logging-s3
      path: /service/{service_id}/version/{version_id}/logging/s3
      operations:
      - name: listlogs3
        method: GET
        description: List S3 logging endpoints
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createlogs3
        method: POST
        description: Create an S3 logging endpoint
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Fastly-Key
      value: '{{env.FASTLY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: logging-logging-s3-rest
    port: 8080
    description: REST adapter for Fastly Real-Time Logging API — Logging S3. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/service/{service-id}/version/{version-id}/logging/s3
      name: service-service-id-version-version-id-logging-s3
      description: REST surface for service-service_id-version-version_id-logging-s3.
      operations:
      - method: GET
        name: listlogs3
        description: List S3 logging endpoints
        call: logging-logging-s3.listlogs3
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createlogs3
        description: Create an S3 logging endpoint
        call: logging-logging-s3.createlogs3
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: logging-logging-s3-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fastly Real-Time Logging API — Logging S3. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: list-s3-logging-endpoints
      description: List S3 logging endpoints
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: logging-logging-s3.listlogs3
      outputParameters:
      - type: object
        mapping: $.
    - name: create-s3-logging-endpoint
      description: Create an S3 logging endpoint
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: logging-logging-s3.createlogs3
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
