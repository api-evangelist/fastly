"""
Fastly GraphQL Schema
Conceptual schema derived from the Fastly REST API (https://developer.fastly.com/reference/api/).
Covers CDN services, edge compute, VCL configuration, logging, TLS, WAF, ACLs, dictionaries,
metrics, account management, and utilities.
"""

scalar DateTime
scalar JSON

# ── Enums ──────────────────────────────────────────────────────────────────────

enum ServiceType {
  VCL
  WASM
}

enum VersionState {
  ACTIVE
  INACTIVE
  LOCKED
  STAGING
}

enum DirectorType {
  RANDOM
  ROUND_ROBIN
  HASH
  CLIENT
  SHIELD
}

enum BackendOverride {
  NO_OVERRIDE
  NO_BODY
  PASS
  RESTART
  RETRY
  SYNTH
  DELIVER
  FETCH
  ERROR
  HASH
  MISS
  HIT
  PIPE
  LOG
}

enum ConditionType {
  REQUEST
  RESPONSE
  CACHE
  PREFETCH
}

enum HeaderAction {
  SET
  APPEND
  DELETE
  REGEX
  REGEX_REPEAT
}

enum HeaderType {
  REQUEST
  FETCH
  CACHE
  RESPONSE
}

enum SnippetType {
  INIT
  RECV
  HASH
  HIT
  MISS
  PASS
  FETCH
  ERROR
  DELIVER
  LOG
  NONE
}

enum LogFormat {
  CLASSIC
  JSON
}

enum LogPlacement {
  NONE
  WAF_DEBUG
}

enum TLSProtocol {
  TLS_1_0
  TLS_1_1
  TLS_1_2
  TLS_1_3
}

enum TokenScope {
  GLOBAL
  PURGE_SELECT
  PURGE_ALL
  GLOBAL_READ
  BILLING
}

enum UserRole {
  SUPERUSER
  USER
  BILLING
  ENGINEER
}

enum PurgeType {
  URL
  SURROGATE_KEY
  ALL
}

enum WAFMode {
  BLOCKING
  LOGGING
  DISABLED
}

enum RateLimiterAction {
  RESPONSE
  SYNTH
  RESTART
}

enum NGWAFRuleAction {
  BLOCK
  ALLOW
  LOG
  FLAG
  EXCLUDE
}

enum StorageClass {
  STANDARD
  INTELLIGENT_TIERING
}

# ── Service ────────────────────────────────────────────────────────────────────

"""A Fastly CDN or Compute service — the primary organizational unit."""
type Service {
  id: ID!
  name: String!
  type: ServiceType!
  comment: String
  customerId: String!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
  versions: [ServiceVersion!]!
  activeVersion: ServiceVersion
  publishedVersions: [ServiceVersion!]!
}

"""A versioned, immutable snapshot of a Fastly service configuration."""
type ServiceVersion {
  number: Int!
  serviceId: ID!
  active: Boolean!
  locked: Boolean!
  deployed: Boolean!
  staging: Boolean!
  testing: Boolean!
  comment: String
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
  backends: [Backend!]!
  domains: [Domain!]!
  conditions: [Condition!]!
  headers: [Header!]!
  cacheRules: [CacheRule!]!
  requestSettings: [RequestSetting!]!
  responseObjects: [ResponseObject!]!
  vclFiles: [VCLFile!]!
  snippets: [Snippet!]!
  gzipConfigs: [GZIPConfig!]!
  acls: [ACL!]!
  dictionaries: [EdgeDictionary!]!
  directors: [Director!]!
  healthchecks: [Healthcheck!]!
  logEndpoints: LogEndpoints!
}

"""Aggregated log endpoint references for a service version."""
type LogEndpoints {
  s3: [S3Logging!]!
  gcs: [GCSLogging!]!
  bigquery: [BigQueryLogging!]!
  splunk: [SplunkLogging!]!
  newrelic: [NewRelicLogging!]!
  datadog: [DatadogLogging!]!
  papertrail: [PapertrailLogging!]!
  https: [HTTPLogging!]!
  sftp: [SFTPLogging!]!
  syslog: [SyslogLogging!]!
  sumologic: [SumoLogicLogging!]!
  loggly: [LogglyLogging!]!
  elasticsearch: [ElasticsearchLogging!]!
}

# ── Networking ─────────────────────────────────────────────────────────────────

"""A hostname (domain) associated with a Fastly service version."""
type Domain {
  name: String!
  comment: String
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
}

"""DNS check result for a domain."""
type DomainCheck {
  name: String!
  cname: String
  valid: Boolean!
  message: String
}

"""An origin server or upstream target for a Fastly service."""
type Backend {
  name: String!
  address: String!
  port: Int!
  useSsl: Boolean!
  sslCheckCert: Boolean!
  sslSniHostname: String
  sslCertHostname: String
  sslClientCert: String
  sslClientKey: String
  comment: String
  connectTimeout: Int
  firstByteTimeout: Int
  betweenBytesTimeout: Int
  maxConn: Int
  weight: Int
  autoLoadbalance: Boolean!
  ipv4: String
  ipv6: String
  shieldPop: String
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
  healthcheck: Healthcheck
}

"""A load-balancing group over multiple backends for a service version."""
type Director {
  name: String!
  type: DirectorType!
  comment: String
  quorum: Int
  retries: Int
  capacity: Int
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
  backends: [Backend!]!
}

"""Membership record linking a backend to a director."""
type DirectorBackend {
  directorName: String!
  backendName: String!
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""A pool of origin servers for dynamic load balancing without version lock."""
type OriginPool {
  id: ID!
  name: String!
  comment: String
  quorum: Int!
  connectTimeout: Int
  firstByteTimeout: Int
  maxConnDefault: Int
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  members: [OriginPoolMember!]!
}

"""An individual server within an origin pool."""
type OriginPoolMember {
  id: ID!
  poolId: ID!
  address: String!
  port: Int!
  weight: Int!
  status: String!
  comment: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Health probe configuration for a backend."""
type Healthcheck {
  name: String!
  host: String!
  path: String!
  httpVersion: String!
  method: String!
  threshold: Int!
  window: Int!
  initial: Int!
  timeout: Int!
  checkInterval: Int!
  expectedResponse: Int!
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
}

# ── Cache Control and VCL Objects ──────────────────────────────────────────────

"""Cache TTL and behavior override rule."""
type CacheRule {
  name: String!
  action: String!
  cacheCondition: String
  staleTtl: Int
  ttl: Int
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
}

"""Logical condition expression gating VCL rule application."""
type Condition {
  name: String!
  statement: String!
  type: ConditionType!
  priority: Int!
  comment: String
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
}

"""HTTP request or response header manipulation rule."""
type Header {
  name: String!
  action: HeaderAction!
  type: HeaderType!
  dst: String!
  src: String
  regex: String
  substitution: String
  ignoreIfSet: Boolean!
  priority: Int!
  cacheCondition: String
  requestCondition: String
  responseCondition: String
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
}

"""Request-handling property overrides (force SSL, max stale age, etc.)."""
type RequestSetting {
  name: String!
  forceMiss: Boolean!
  forceSsl: Boolean!
  action: String
  bypassBusyWait: Boolean!
  maxStaleAge: Int
  hashKeys: String
  xForwardedFor: String
  timerSupport: Boolean!
  geo: Boolean!
  defaultHost: String
  requestCondition: String
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
}

"""Synthetic HTTP response returned at the edge without contacting origin."""
type ResponseObject {
  name: String!
  status: Int!
  response: String!
  content: String
  contentType: String
  cacheCondition: String
  requestCondition: String
  responseCondition: String
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
}

"""Gzip compression configuration for specific response content types."""
type GZIPConfig {
  name: String!
  contentTypes: [String!]!
  extensions: [String!]!
  cacheCondition: String
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
}

"""A complete custom VCL program uploaded to a service version."""
type VCLFile {
  name: String!
  content: String!
  main: Boolean!
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
}

"""A reusable VCL snippet inserted at a specific subroutine."""
type Snippet {
  id: ID!
  name: String!
  content: String!
  type: SnippetType!
  priority: Int!
  dynamic: Boolean!
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
}

# ── Access Control Lists ───────────────────────────────────────────────────────

"""Named IP access control list container attached to a service version."""
type ACL {
  id: ID!
  name: String!
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
  entries: [ACLEntry!]!
}

"""Individual IP address or CIDR block entry within an ACL."""
type ACLEntry {
  id: ID!
  aclId: ID!
  serviceId: ID!
  ip: String!
  subnet: Int
  negated: Boolean!
  comment: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Permission metadata for ACL operations."""
type ACLPermission {
  aclId: ID!
  serviceId: ID!
  canRead: Boolean!
  canWrite: Boolean!
  canDelete: Boolean!
}

# ── Edge Dictionaries ──────────────────────────────────────────────────────────

"""Key-value store accessible in VCL without requiring a service version change."""
type EdgeDictionary {
  id: ID!
  name: String!
  writeOnly: Boolean!
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
  items: [DictionaryItem!]!
  info: DictionaryInfo
}

"""Individual key-value pair within an edge dictionary."""
type DictionaryItem {
  dictionaryId: ID!
  serviceId: ID!
  itemKey: String!
  itemValue: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""Metadata and content digest for the current state of a dictionary."""
type DictionaryInfo {
  lastUpdatedAt: DateTime!
  itemCount: Int!
  digest: String!
}

# ── Logging Endpoints ──────────────────────────────────────────────────────────

"""Base fields shared by all logging endpoint types."""
interface LogEndpoint {
  name: String!
  format: String
  formatVersion: Int
  placement: LogPlacement
  responseCondition: String
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
}

"""Amazon S3 log streaming endpoint configuration."""
type S3Logging implements LogEndpoint {
  name: String!
  format: String
  formatVersion: Int
  placement: LogPlacement
  responseCondition: String
  serviceId: ID!
  serviceVersion: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  deletedAt: DateTime
  bucketName: String!
  accessKey: String
  secretKey: String
  iamRole: String
  domain: String
  path: String
  period: Int
  compressionCodec: String
  gzipLevel: Int
  redundancy: String
  serverSideEncryption: String
  serverSideEncryptionKmsKeyId: String
  publicKey: String
  acl: String
  storageClass: StorageClass
